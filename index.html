<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Film axtar</title>
</head>

<body>

    <main>

        <div class="banner">
            <form action="#">
                <input type="text" id="search" placeholder="Tapmaq istədiyin filmin adını yaz">
                <button id="btn">Axtar</button>
            </form>
            <div id="message"></div>
            <div id="found"></div>
            <div id="loading"></div>
        </div>
        <div class="page-numbers">
            <button id="previous">Geri</button>
            <span>Tapılan səhifə : <span class="pag"></span></span>
            <button id="next">İrəli</button>
        </div>
        <div class="movie-container" id="addMovie">

            <div id="movie-inner"></div>
        </div>

    </main>
    <script src="./js/images.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
